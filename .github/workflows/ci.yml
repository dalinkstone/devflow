name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: lint
        run: make lint
      - name: functional tests (fake daytona)
        run: make test

  provision-in-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: provision script end-to-end in ubuntu container
        run: bash tests/docker-provision-test.sh
